<!DOCTYPE html>
<html>
<head>
<title>Student Grade Calculator</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
text-align:center;
padding:40px;
color:white;
}

.container{
background:white;
color:black;
padding:30px;
border-radius:10px;
width:350px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#2575fc;
border:none;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h1>🎓 Student Grade Calculator</h1>

<div class="container">

<form method="POST">

<input name="name" placeholder="Student Name" required>

<input name="m1" type="number" placeholder="Subject 1 marks" required>
<input name="m2" type="number" placeholder="Subject 2 marks" required>
<input name="m3" type="number" placeholder="Subject 3 marks" required>

<button type="submit">Calculate</button>

</form>

{% if result %}
<h3>Student: {{result.name}}</h3>
<p>Average: {{result.avg}}</p>
<p>Result: {{result.status}}</p>
{% endif %}

</div>

</body>
</html>
